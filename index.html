<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0E11">
<title>Sector Pulse — NSE Signals</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg: #0B0E11;
    --panel: #12161C;
    --panel-border: #1F252E;
    --text: #E7EAEE;
    --muted: #8B93A1;
    --bull: #17C695;
    --bull-dim: #103A31;
    --bear: #FF5C5C;
    --bear-dim: #3A1A1A;
    --neutral: #F2A93B;
    --mono: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh;}
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, var(--bg) 80%, transparent);
    padding:16px 16px 8px;
    border-bottom:1px solid var(--panel-border);
  }
  .title-row{display:flex; align-items:baseline; justify-content:space-between;}
  h1{font-size:19px; font-weight:700; margin:0; letter-spacing:0.2px;}
  .ticker-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--bull); margin-right:7px; box-shadow:0 0 8px var(--bull); animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.35;}}
  .updated{font-family:var(--mono); font-size:11px; color:var(--muted);}
  main{padding:14px 16px 40px; max-width:640px; margin:0 auto;}
  .section-label{font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin:18px 2px 10px;}
  .sector-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .sector-card{
    background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:12px 13px; cursor:pointer; position:relative; overflow:hidden;
    transition:transform 0.12s ease;
  }
  .sector-card:active{transform:scale(0.97);}
  .sector-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .sector-card.bullish::before{background:var(--bull);}
  .sector-card.bearish::before{background:var(--bear);}
  .sector-card.neutral::before{background:var(--neutral);}
  .sector-name{font-size:13px; font-weight:600; margin-bottom:6px;}
  .sector-score{font-family:var(--mono); font-size:20px; font-weight:700;}
  .sector-card.bullish .sector-score{color:var(--bull);}
  .sector-card.bearish .sector-score{color:var(--bear);}
  .sector-card.neutral .sector-score{color:var(--neutral);}
  .sector-meta{font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:4px;}

  .stock-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
    padding:11px 13px; margin-bottom:8px;
  }
  .stock-left{display:flex; flex-direction:column; gap:3px;}
  .stock-symbol{font-weight:700; font-size:14px;}
  .stock-sub{font-family:var(--mono); font-size:10.5px; color:var(--muted);}
  .stock-right{text-align:right; display:flex; flex-direction:column; gap:3px; align-items:flex-end;}
  .stock-price{font-family:var(--mono); font-size:13px;}
  .badge{
    font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px;
    text-transform:uppercase; letter-spacing:0.4px;
  }
  .badge.strong-buy{background:var(--bull-dim); color:var(--bull);}
  .badge.buy{background:var(--bull-dim); color:var(--bull); opacity:0.8;}
  .badge.watch{background:#2A2412; color:var(--neutral);}
  .badge.neutral, .badge.insufficient-data{background:#20242B; color:var(--muted);}

  .back-btn{
    display:inline-flex; align-items:center; gap:6px; color:var(--muted);
    font-size:13px; margin-bottom:14px; cursor:pointer; background:none; border:none; padding:0;
    font-family:var(--sans);
  }
  .empty{
    text-align:center; color:var(--muted); padding:60px 20px; font-size:13px; line-height:1.6;
  }
  .empty .big{font-size:32px; display:block; margin-bottom:10px;}
  #sector-view{display:none;}
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1><span class="ticker-dot"></span>Sector Pulse</h1>
    <span class="updated" id="updated-at">—</span>
  </div>
</header>

<main>
  <div id="home-view">
    <div class="section-label">Sectors — Ranked by Bullish Score</div>
    <div class="sector-grid" id="sector-grid"></div>
  </div>

  <div id="sector-view">
    <button class="back-btn" onclick="showHome()">← All sectors</button>
    <div class="section-label" id="sector-view-title">—</div>
    <div id="stock-list"></div>
  </div>

  <div class="empty" id="empty-state" style="display:none;">
    <span class="big">📡</span>
    No signal data yet.<br>
    Run the GitHub Action (or wait for the next scheduled run) to populate data/signals.json.
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
